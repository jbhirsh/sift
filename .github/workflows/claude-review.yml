name: Claude Code Review

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: claude-review-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_sha }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review:
    name: Claude Review
    if: >-
      github.event.workflow_run.event == 'pull_request'
      && github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Resolve PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          PR_JSON=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" --jq '.[0]')
          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "No PR associated with $SHA — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          BRANCH=$(echo "$PR_JSON" | jq -r '.head.ref')
          echo "PR #$NUMBER on branch $BRANCH"
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        if: steps.pr.outputs.skip == 'false'
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        if: steps.pr.outputs.skip == 'false'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO_DIR: ${{ github.workspace }}
            PR: ${{ steps.pr.outputs.number }}

            Review this pull request for correctness, bugs, and adherence to the
            project conventions in CLAUDE.md. This is a React Native (Expo SDK 55,
            RN 0.83, TypeScript strict) app. Focus on:
              - Logic errors and edge cases
              - Type safety and null/undefined handling
              - React/React Native pitfalls (stale closures, effect deps, re-renders)
              - Violations of the project's architecture (SiftContext reducer pattern,
                phase routing, provider interface, theme tokens)
              - Missing unit tests for new reducer actions, services, or utilities
              - New UI experiences or user-facing flows without corresponding E2E
                coverage in __tests__/e2e/ (Maestro)

            Do NOT flag floating GitHub Action version tags (e.g. `@v5`,
            `@v1`) as a supply-chain risk or suggest pinning to commit SHAs.
            The maintainer has accepted this trade-off.

            For every issue you find on a specific line, call the
            `mcp__github_inline_comment__create_inline_comment` tool to leave
            an inline comment anchored to that line. Do not summarize findings
            in a single top-level comment — use inline comments so each issue
            is anchored to the relevant code. Only use a top-level summary for
            overall impressions. Skip style nits already enforced by
            ESLint/Prettier. Be concise.
          classify_inline_comments: "true"
          claude_args: |
            --max-turns 40
            --allowedTools "mcp__github_inline_comment__create_inline_comment"
