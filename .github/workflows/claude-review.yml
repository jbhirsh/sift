name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO_DIR: ${{ github.workspace }}
            PR: ${{ github.event.pull_request.number }}

            Review this pull request for correctness, bugs, and adherence to the
            project conventions in CLAUDE.md. This is a React Native (Expo SDK 55,
            RN 0.83, TypeScript strict) app. Focus on:
              - Logic errors and edge cases
              - Type safety and null/undefined handling
              - React/React Native pitfalls (stale closures, effect deps, re-renders)
              - Violations of the project's architecture (SiftContext reducer pattern,
                phase routing, provider interface, theme tokens)
              - Missing unit tests for new reducer actions, services, or utilities
              - New UI experiences or user-facing flows without corresponding E2E
                coverage in __tests__/e2e/ (Maestro)

            For every issue you find on a specific line, call the
            `mcp__github_inline_comment__create_inline_comment` tool to leave
            an inline comment anchored to that line. Do not summarize findings
            in a single top-level comment — use inline comments so each issue
            is anchored to the relevant code. Only use a top-level summary for
            overall impressions. Skip style nits already enforced by
            ESLint/Prettier. Be concise.
          claude_args: "--max-turns 15"
