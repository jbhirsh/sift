# Compile gate for the iOS native code. Lint, typecheck, and Jest never touch
# the Swift in modules/expo-musickit — this job is the only PR check that
# proves it still compiles. GitHub-hosted macOS runners are free on public
# repos, so it costs nothing; it's path-filtered to native-affecting files to
# keep PR feedback fast everywhere else.
name: iOS Build

on:
  pull_request:
    branches: [main]
    paths:
      - 'modules/**'
      - 'app.json'
      - 'eas.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build iOS simulator app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      # Native-logic unit tests: the expo-musickit module's pure logic lives
      # in a SwiftPM package (modules/expo-musickit/logic) precisely so it can
      # be tested without MusicKit, a simulator, or an Xcode project. Guarded
      # on the manifest so this step is a no-op until the package lands.
      - name: Swift logic tests (coverage-gated)
        run: |
          if [ -f modules/expo-musickit/logic/Package.swift ]; then
            swift test --package-path modules/expo-musickit/logic --enable-code-coverage
            COV_JSON=$(swift test --package-path modules/expo-musickit/logic --show-codecov-path)
            # Enforce the same 80% line-coverage floor the JS suite has,
            # measured over package Sources only (tests excluded).
            TOTAL=$(jq -r '[.data[0].files[] | select(.filename | contains("/Sources/"))] | map(.summary.lines.count) | add // 0' "$COV_JSON")
            if [ "$TOTAL" -eq 0 ]; then
              echo "::error::No coverage data for package Sources — empty test target or report-format drift. Refusing to treat missing data as 100%."
              exit 1
            fi
            COV=$(jq -r '[.data[0].files[] | select(.filename | contains("/Sources/"))] | (map(.summary.lines.covered) | add) as $c | (map(.summary.lines.count) | add) as $t | 100 * $c / $t' "$COV_JSON")
            printf 'Swift logic line coverage: %.1f%%\n' "$COV"
            awk -v c="$COV" 'BEGIN { exit (c < 80) ? 1 : 0 }' || {
              echo "::error::Swift logic coverage ${COV}% is below the 80% floor"
              exit 1
            }
          else
            echo "No Swift logic package yet — skipping."
          fi


      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      # Dependabot-triggered runs receive Dependabot secrets, not Actions
      # secrets — without EXPO_TOKEN there, eas can't authenticate, so skip
      # green with a notice rather than run a build that can only fail.
      # SENTRY_AUTH_TOKEN is only needed for the source-map upload inside the
      # build: when absent, keep the compile check and disable the upload
      # instead of skipping. Registering both as Dependabot secrets upgrades
      # bot PRs to the full check.
      - name: Check for EAS credentials
        id: creds
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            if [ -n "$SENTRY_AUTH_TOKEN" ]; then
              echo "sentry_upload=false" >> "$GITHUB_OUTPUT"
            else
              echo "sentry_upload=true" >> "$GITHUB_OUTPUT"
              echo "::notice::SENTRY_AUTH_TOKEN unavailable — building with source-map upload disabled."
            fi
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::EXPO_TOKEN unavailable in this trigger context (Dependabot/fork) — skipping the iOS compile check."
          fi

      - name: Build simulator app (compiles expo-musickit Swift)
        if: steps.creds.outputs.present == 'true'
        run: eas build --profile e2e-simulator --platform ios --local --non-interactive --output build/Sift-e2e.tar.gz
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DISABLE_AUTO_UPLOAD: ${{ steps.creds.outputs.sentry_upload }}
          USE_CCACHE: '1'

      # The E2E job (ci.yml) can reuse this instead of rebuilding: download the
      # artifact from a recent run if the fingerprint matches.
      - uses: actions/upload-artifact@v7
        if: steps.creds.outputs.present == 'true'
        with:
          name: sift-simulator-app
          path: build/Sift-e2e.tar.gz
          retention-days: 7
