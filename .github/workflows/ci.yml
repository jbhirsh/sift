name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/**/*.md'
      - 'LICENSE'
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/**/*.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Lint, Typecheck & Unit Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test with coverage
        run: npx jest --coverage

      - name: Expo Doctor
        run: npx expo-doctor@latest
        continue-on-error: true

  e2e:
    name: E2E Tests (Maestro)
    needs: check
    # Runs on GitHub-hosted macOS (free on public repos). Manual dispatch only:
    # a cold run rebuilds the simulator app (~20-30 min); warm runs restore it
    # from actions/cache keyed on the project fingerprint. Trigger from the
    # Actions tab (workflow_dispatch).
    if: github.event_name == 'workflow_dispatch'
    # Pinned (not macos-latest) so a runner-image migration can't silently
    # change simulator/Xcode behavior; bump deliberately. macos-26 is the
    # image the working builds resolve to (Xcode 26; Expo SDK 55 requires
    # >=26 — macos-15's default Xcode 16.4 cannot compile expo-modules-core).
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Compute project fingerprint
        id: fingerprint
        run: |
          NATIVE=$(npx expo-updates fingerprint:generate --platform ios 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['hash'])")
          SOURCE=$(find src __tests__ -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' \) -print0 | sort -z | xargs -0 shasum -a 256 | shasum -a 256 | cut -d' ' -f1)
          FINGERPRINT="${NATIVE}-${SOURCE}"
          echo "hash=$FINGERPRINT" >> "$GITHUB_OUTPUT"
          echo "Fingerprint: $FINGERPRINT"

      - name: Restore build cache
        id: build-cache
        uses: actions/cache@v4
        with:
          path: build/e2e
          key: sift-e2e-${{ steps.fingerprint.outputs.hash }}

      - name: Build simulator app
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: eas build --profile e2e-simulator --platform ios --local --non-interactive --output build/Sift-e2e.tar.gz
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          USE_CCACHE: '1'

      - name: Extract build
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p build/e2e
          tar -xzf build/Sift-e2e.tar.gz -C build/e2e

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Boot iOS Simulator
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          devices = json.load(sys.stdin)['devices']
          for runtime, devs in devices.items():
              if 'iOS' in runtime:
                  for d in devs:
                      if 'iPhone' in d['name']:
                          print(d['udid'])
                          sys.exit(0)
          ")
          xcrun simctl boot "$DEVICE" 2>/dev/null || true
          # Block until SpringBoard is actually up — attaching the XCUITest
          # driver to a half-booted simulator is the main startup-flake source.
          xcrun simctl bootstatus "$DEVICE" -b

      - name: Install app on simulator
        run: xcrun simctl install booted build/e2e/*.app

      - name: Run Maestro tests
        env:
          # GitHub-hosted macOS runners can be slow enough that the XCUITest
          # driver misses Maestro's default startup window (seen as
          # IOSDriverTimeoutException in run 29703273714). Give it 5 minutes.
          MAESTRO_DRIVER_STARTUP_TIMEOUT: "300000"
          # No analytics network call — one less nondeterministic dependency.
          MAESTRO_CLI_NO_ANALYTICS: "1"
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          # No automatic retry: a retry would mask residual nondeterminism as
          # green runs. Every failure surfaces loudly with debug artifacts,
          # and the fix goes to the root cause, not another attempt.
          maestro test --debug-output maestro-debug .maestro/

      - name: Upload Maestro debug artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-debug
          # Maestro writes per-flow screenshots and view hierarchies under
          # ~/.maestro/tests regardless of --debug-output on some versions;
          # capture both, and fail loudly if neither exists — an empty debug
          # artifact silently defeats the whole no-retry diagnosis doctrine.
          path: |
            maestro-debug
            ~/.maestro/tests
          if-no-files-found: error
          retention-days: 7

  review:
    name: Claude Review
    needs: check
    # Runs as a dependent CI job on pull requests (after `check` passes) rather
    # than as a separate workflow_run workflow. On GitHub-hosted ubuntu; fork
    # PRs run without secrets, so the review only posts on same-repo PRs.
    if: github.event_name == 'pull_request' && success()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Let the AI review run on Dependabot's dependency-bump PRs. Without
          # this, claude-code-action refuses to run for the bot actor and fails
          # with "Workflow initiated by non-human actor: dependabot (type: Bot)".
          # Allow-list only this one trusted bot rather than "*".
          allowed_bots: "dependabot[bot]"
          prompt: |
            REPO_DIR: ${{ github.workspace }}
            PR: ${{ github.event.pull_request.number }}

            Review this pull request for correctness, bugs, and adherence to
            the project conventions in CLAUDE.md (checked into the repo — read
            it). This is a React Native (Expo SDK 55, RN 0.83, TypeScript
            strict) app. Focus on:
              - Logic errors and edge cases
              - Type safety and null/undefined handling
              - React/React Native pitfalls (stale closures, effect deps,
                re-renders)
              - Violations of the project's architecture (SiftContext reducer
                pattern, phase routing, provider interface, theme tokens)
              - Missing unit tests for new reducer actions, services, or
                utilities
              - New UI experiences or user-facing flows without corresponding
                Maestro E2E coverage in .maestro/

            Do NOT flag floating GitHub Action version tags (e.g. `@v5`,
            `@v1`) as a supply-chain risk or suggest pinning to commit SHAs.
            The maintainer has accepted this trade-off.

            For every issue you find on a specific line, call the
            `mcp__github_inline_comment__create_inline_comment` tool to leave
            an inline comment anchored to that line. Do not summarize findings
            in a single top-level comment — use inline comments so each issue
            is anchored to the relevant code. Only use a top-level summary for
            overall impressions. Skip style nits already enforced by
            ESLint/Prettier. Be concise.
          classify_inline_comments: "true"
          display_report: "true"
          show_full_output: "true"
          claude_args: |
            --max-turns 80
            --allowedTools "Read,Grep,Glob,Bash(gh:*),Bash(git fetch:*),Bash(git checkout:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git blame:*),Bash(git rev-parse:*),Bash(git branch:*),Bash(git ls-files:*),mcp__github_inline_comment__create_inline_comment"
