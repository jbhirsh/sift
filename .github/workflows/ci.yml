name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test with coverage
        run: npx jest --coverage

  e2e:
    name: E2E Tests (Maestro)
    needs: check
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build simulator app
        run: eas build --profile e2e-simulator --platform ios --local --non-interactive --output build/Sift-e2e.tar.gz
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Extract build
        run: |
          mkdir -p build/e2e
          tar -xzf build/Sift-e2e.tar.gz -C build/e2e

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Boot iOS Simulator
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          devices = json.load(sys.stdin)['devices']
          for runtime, devs in devices.items():
              if 'iOS' in runtime:
                  for d in devs:
                      if 'iPhone' in d['name']:
                          print(d['udid'])
                          sys.exit(0)
          ")
          xcrun simctl boot "$DEVICE"

      - name: Install app on simulator
        run: xcrun simctl install booted build/e2e/*.app

      - name: Run Maestro tests
        run: maestro test .maestro/
