name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict

  unit-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode and boot simulator
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcrun simctl boot "iPhone 16" 2>/dev/null || true

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          make generate

      - name: Unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Sift.xcodeproj \
            -scheme SiftUnitTests \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath UnitTestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            | xcpretty

      - name: Check code coverage
        run: |
          # Extract coverage for the Sift target only (exclude test targets)
          # xccov may report as "87.8%" or as "(2030/2312)" — handle both
          RAW=$(xcrun xccov view --report --only-targets UnitTestResults.xcresult \
            | grep '\.app' \
            | head -1 \
            | awk '{print $NF}')

          if echo "$RAW" | grep -q '/'; then
            # Fraction format: (2030/2312) → compute percentage
            NUM=$(echo "$RAW" | tr -d '()' | cut -d'/' -f1)
            DEN=$(echo "$RAW" | tr -d '()' | cut -d'/' -f2)
            COVERAGE=$(echo "scale=2; $NUM * 100 / $DEN" | bc)
          else
            # Percentage format: 87.8%
            COVERAGE=$(echo "$RAW" | tr -d '%')
          fi

          echo "Overall coverage: ${COVERAGE}%"

          # Fail if coverage drops below 70%
          MIN_COVERAGE=70
          if (( $(echo "$COVERAGE < $MIN_COVERAGE" | bc -l) )); then
            echo "::error::Code coverage ${COVERAGE}% is below the minimum threshold of ${MIN_COVERAGE}%"
            exit 1
          fi

          echo "✅ Coverage ${COVERAGE}% meets minimum threshold of ${MIN_COVERAGE}%"

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: UnitTestResults.xcresult

  integration-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode and boot simulator
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcrun simctl boot "iPhone 16" 2>/dev/null || true

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          make generate

      - name: Integration tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Sift.xcodeproj \
            -scheme Sift \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:SiftUITests/SiftUITests \
            -resultBundlePath IntegTestResults.xcresult \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            | xcpretty

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: IntegTestResults.xcresult
