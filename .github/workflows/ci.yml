name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict

      - name: Unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Sift.xcodeproj \
            -scheme SiftUnitTests \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath UnitTestResults.xcresult \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            | xcpretty

      - name: Integration tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Sift.xcodeproj \
            -scheme Sift \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:SiftUITests/SiftUITests \
            -resultBundlePath IntegTestResults.xcresult \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            | xcpretty

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            UnitTestResults.xcresult
            IntegTestResults.xcresult
