name: Deploy to Mac App Store

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  deploy:
    runs-on: macos-15
    environment: app-store

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Sift.xcodeproj \
            -scheme Sift \
            -destination 'platform=macOS' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_ENTITLEMENTS= \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            | xcpretty

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_SIGNING_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Install provisioning profile
        run: |
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/sift.provisioningprofile"
          mkdir -p "$(dirname "$PROFILE_PATH")"
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "$PROFILE_PATH"

      - name: Set build number from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          BUILD=$(echo "$VERSION" | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')
          xcrun agvtool new-marketing-version "$VERSION"
          xcrun agvtool new-version -all "$BUILD"

      - name: Build, archive, and submit
        run: fastlane deploy
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
