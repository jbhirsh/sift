name: Claude Auto-Fix PR Comments

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: claude-autofix-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_sha }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  autofix:
    name: Auto-Fix Unresolved Review Comments
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Resolve PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          PR_JSON=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" --jq '.[0]')
          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "No PR associated with $SHA — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          BRANCH=$(echo "$PR_JSON" | jq -r '.head.ref')
          LABELS=$(echo "$PR_JSON" | jq -r '[.labels[].name] | join(",")')
          echo "PR #$NUMBER on branch $BRANCH (labels: $LABELS)"
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          if echo "$LABELS" | tr ',' '\n' | grep -qx "no-auto-fix"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        if: steps.pr.outputs.skip == 'false'
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - uses: actions/setup-node@v7
        if: steps.pr.outputs.skip == 'false'
        with:
          node-version: 24
          cache: npm

      - name: Count unresolved threads
        if: steps.pr.outputs.skip == 'false'
        id: threads
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UNRESOLVED=0
          CURSOR=null
          while : ; do
            PAGE=$(gh api graphql \
              -f query='query($owner:String!,$name:String!,$number:Int!,$after:String){repository(owner:$owner,name:$name){pullRequest(number:$number){reviewThreads(first:100,after:$after){pageInfo{hasNextPage endCursor} nodes{isResolved}}}}}' \
              -F owner="${{ github.repository_owner }}" \
              -F name="${{ github.event.repository.name }}" \
              -F number=${{ steps.pr.outputs.number }} \
              -F after="$CURSOR")
            COUNT=$(echo "$PAGE" | jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved==false)] | length')
            UNRESOLVED=$((UNRESOLVED + COUNT))
            HAS_NEXT=$(echo "$PAGE" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            if [ "$HAS_NEXT" != "true" ]; then break; fi
            CURSOR=$(echo "$PAGE" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor')
          done
          echo "Unresolved threads: $UNRESOLVED"
          echo "count=$UNRESOLVED" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        if: steps.pr.outputs.skip == 'false' && steps.threads.outputs.count != '0'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Now that the Claude Review job runs on Dependabot PRs, it can leave
          # review threads that this autofix step acts on. This job is triggered
          # by workflow_run, where github.actor is the actor of the initiating CI
          # run — dependabot[bot] for a Dependabot PR. Allow that one trusted bot
          # so autofix can run instead of failing the non-human-actor check.
          allowed_bots: "dependabot[bot]"
          track_progress: true
          prompt: |
            REPO_DIR: ${{ github.workspace }}
            REPO: ${{ github.repository }}
            PR: ${{ steps.pr.outputs.number }}

            Address every unresolved PR review comment on this PR by landing
            fixup commits that autosquash into the commit that introduced the
            fixed code, then resolve the matching threads. The branch is
            already checked out — use `git branch --show-current` if you need
            the name.

            ## Step 1 — fetch unresolved threads

            Paginate through all review threads (don't stop at 100):

            ```
            gh api graphql -f query='query($after:String) {
              repository(owner:"${{ github.repository_owner }}", name:"${{ github.event.repository.name }}") {
                pullRequest(number: ${{ steps.pr.outputs.number }}) {
                  reviewThreads(first: 100, after: $after) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      id
                      isResolved
                      comments(first: 5) {
                        nodes { databaseId path line body }
                      }
                    }
                  }
                }
              }
            }'
            ```

            Loop until `hasNextPage == false`.

            Filter to threads where `isResolved == false`. Each such thread is
            a bug to fix.

            ## Step 2 — fan out patching agents in parallel

            For every unresolved thread, spawn a sub-agent via the Task tool.
            Send them all in a single message so they run in parallel. Each
            sub-agent:
              - Reads the referenced file/line and the comment body
              - Applies the minimum correct change (no drive-by refactors, no
                new tests unless the comment asks for one)
              - If the comment is subjective/ambiguous or no clean fix exists,
                SKIPS and returns "skipped: <reason>"
              - ALWAYS SKIPS comments asking to pin GitHub Action tags
                (`@v5`, `@v1`, etc.) to commit SHAs — the maintainer prefers
                floating tags. Return "skipped: floating action tags policy"
              - Otherwise returns: thread id, list of files it touched, and
                the primary line number(s) it fixed

            WAIT for ALL sub-agents to finish before moving on.

            ## Step 3 — one fixup commit per fix, targeting the introducing
            commit

            For each sub-agent that returned a fix (not a skip):
              - Stage only the files it touched: `git add -- <file1> <file2>`
                (NEVER `git add -A` / `git add .`)
              - Find the commit that introduced the fixed line:
                ```
                git blame -L <line>,<line> -- <path> | awk '{print $1}'
                ```
                If the fix touches multiple lines/files, pick the oldest
                blame SHA that is on this PR's branch (in `origin/main..HEAD`).
                If no blame SHA belongs to this PR, fixup into HEAD.
              - `git commit --fixup=<sha>`

            ## Step 4 — autosquash rebase

            Once all fixup commits exist, fold them into their targets:

            ```
            GIT_SEQUENCE_EDITOR=true git rebase -i --autosquash origin/main
            ```

            ## Step 5 — validate

            Run, in order:
              - `npm ci` (only if `node_modules` is missing)
              - `make check` (lint + typecheck + tests — per Sift's CLAUDE.md)

            If any step fails, fix the regression (as an additional fixup
            commit + another autosquash rebase) before pushing.

            ## Step 6 — push

            `git push --force-with-lease`

            NEVER use `--no-verify`.

            ## Step 7 — resolve threads (REQUIRED)

            This step is MANDATORY. As soon as the push succeeds, resolve
            every thread you fixed — before posting the summary comment,
            before anything else. If you skip this, reviewers see "fixed but
            still open" threads and the PR stays noisy.

            Batch all fixed threads into a single GraphQL mutation using
            aliases so it's one network call:

            ```
            gh api graphql -f query='mutation {
              t1: resolveReviewThread(input:{threadId:"<id1>"}) { thread { id isResolved } }
              t2: resolveReviewThread(input:{threadId:"<id2>"}) { thread { id isResolved } }
              # ...one alias per fixed thread
            }'
            ```

            Do NOT resolve threads you skipped. If a resolve call fails,
            retry it before moving on.

            ## Step 8 — report

            Post a single top-level PR comment summarizing:
              - Threads resolved (thread id → target commit SHA they folded
                into)
              - Threads skipped, and why
              - The final HEAD SHA

            If validation failed and you ran out of attempts, do NOT push.
            Post a comment explaining which thread caused the failure and
            leave the branch untouched.

          claude_args: |
            --max-turns 80
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep,Task"
