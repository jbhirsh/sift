appId: com.jessicahirsh.sift
name: "Playlist Source - Select and Sift"
---

# Test selecting a playlist as the sift source and sifting through it
- launchApp:
    clearState: true

- waitForAnimationToEnd

# Verify setup screen
- extendedWaitUntil:
    visible:
      id: "setup-brand"
    timeout: 30000

# Tap "Playlist" in the source picker
- tapOn:
    id: "source-playlist"

# Wait for playlist picker modal to appear
- extendedWaitUntil:
    visible:
      id: "playlist-picker-modal"
    timeout: 30000

# Verify picker shows playlists (mock provider returns 3)
- assertVisible:
    id: "playlist-picker-list"

# Select the first playlist
- tapOn:
    id: "playlist-row-playlist-1"

# Verify modal dismissed and playlist name is shown on setup screen
- assertNotVisible:
    id: "playlist-picker-modal"
- assertVisible: "Change"

# Start sifting with the selected playlist
- tapOn: "Start Sifting"

# Wait for sift screen to appear
- extendedWaitUntil:
    visible:
      id: "card-track-name"
    timeout: 30000

# Verify sift screen works with playlist tracks
- assertVisible:
    id: "card-track-name"
- assertVisible: "Keep"
- assertVisible: "Skip"
- assertVisible: "Remove"

# Make a decision to verify the flow works
- tapOn: "Keep"
- waitForAnimationToEnd

- assertVisible:
    id: "stat-kept"
    text: "1 kept"

# ── Finish the playlist (Chill Vibes has 3 tracks) and reach Done ──
- tapOn: "Keep"
- waitForAnimationToEnd
- tapOn: "Keep"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "done-title"
    timeout: 30000

- assertVisible:
    id: "summary-count-kept"
    text: "3"
- assertVisible:
    id: "summary-count-removed"
    text: "0"

# The stateless mock provider never exposes the incrementally-created
# "Chill Vibes - Sifted" playlist, so the kept tracks buffer as pendingKeeps
# and the Done screen's fallback save persists them — ending in the
# sifted-playlist success confirmation. (The failure/Retry state is not
# reachable here — this fallback goes through createPlaylist, which is
# never injected; 09_save_failure_retry.yaml covers the failed-save error
# and Retry via the EXPO_PUBLIC_MOCK_FAIL_ADDS injection.)
- extendedWaitUntil:
    visible: "Sifted playlist created!"
    timeout: 30000

# ── Start Over on a playlist source must ask for confirmation ──
- tapOn: "Start Over"

- extendedWaitUntil:
    visible: "Start Over?"
    timeout: 30000

# Cancel keeps everything: still on Done, success message intact
- tapOn: "Cancel"

- assertVisible:
    id: "done-title"
- assertVisible: "Sifted playlist created!"
