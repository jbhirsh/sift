appId: com.jessicahirsh.sift
name: "Sift Decisions - Keep, Remove, Skip"
---

# Test that tapping each decision button advances to the next track
- launchApp:
    clearState: true

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "setup-brand"
    timeout: 30000

- tapOn: "Start Sifting"

- extendedWaitUntil:
    visible:
      id: "card-track-name"
    timeout: 30000

# Keep the first track
- tapOn: "Keep"
- waitForAnimationToEnd

# Remove the second track
- tapOn: "Remove"
- waitForAnimationToEnd

# Skip the third track
- tapOn: "Skip"
- waitForAnimationToEnd

# Verify stats updated — text format is "N label"
- assertVisible:
    id: "stat-kept"
    text: "1 kept"
- assertVisible:
    id: "stat-removed"
    text: "1 removed"
- assertVisible:
    id: "stat-skipped"
    text: "1 skipped"
