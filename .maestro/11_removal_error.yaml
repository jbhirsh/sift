appId: com.jessicahirsh.sift
name: "Failed Removal Shows the Removal-Errors Warning"
---

# Exercises the removal-errors warning block on the Done screen, which is
# unreachable without failure injection (the mock's removals never fail on
# their own).
#
# Injection: the e2e-simulator build bakes EXPO_PUBLIC_MOCK_FAIL_REMOVES=1
# into the bundle (eas.json), which makes MockMusicProvider reject the FIRST
# removeFromLibrary call of each app launch; later calls succeed. This is
# only safe because of a flow audit (see the injection comment in
# MockMusicProvider.ts): the only other flow that removes from the library
# is 03, which never reaches Done and asserts only DECIDE-driven stats that
# a silently-failed native removal does not change. removeFromPlaylist is
# deliberately NOT injectable — the Start Over clears in flows 08/09 depend
# on it.
#
# Default sort is Least Played, so the first card is "Peaches" (playCount
# 28). Removing it consumes the injected failure: the decision itself still
# counts (removal intent is always logged), but the native removal fails and
# is queued into removalErrors for the Done screen's warning block.
- launchApp:
    clearState: true

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "setup-brand"
    timeout: 30000

- tapOn: "Start Sifting"

- extendedWaitUntil:
    visible:
      id: "card-track-name"
    timeout: 30000

- assertVisible:
    id: "card-track-name"
    text: "Peaches"

# Remove the first track — the injected failure fires here
- tapOn: "Remove"
- waitForAnimationToEnd

# Keep the remaining 9 tracks to reach Done
- repeat:
    times: 9
    commands:
      - tapOn: "Keep"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "done-title"
    timeout: 30000

- assertVisible:
    id: "summary-count-removed"
    text: "1"

# The warning block names the track that is actually still in place, and
# the blanket "have been moved" claim is qualified.
- assertVisible:
    id: "removal-errors"
- assertVisible:
    id: "removal-error-0"
    text: "Peaches"
- assertVisible: ".*but some could not be.*"
