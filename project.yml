name: Sift

packages:
  SpotifyiOS:
    url: https://github.com/spotify/ios-sdk
    from: "2.1.6"

options:
  bundleIdPrefix: com.jessicahirsh
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_NAME: Sift
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Sift:
    type: application
    platform: iOS
    bundleId: com.jessicahirsh.sift
    deploymentTarget: "17.0"
    sources:
      - Sift
    settings:
      base:
        INFOPLIST_FILE: Sift/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSET_CATALOG_APP_ICON: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sift/Resources/Sift.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.jessicahirsh.sift
        DEVELOPMENT_TEAM: 9PWVKSC697
        CODE_SIGN_STYLE: Automatic
        OTHER_LDFLAGS: ""
        TARGETED_DEVICE_FAMILY: "1,2"
    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint > /dev/null; then
            swiftlint lint --strict
          else
            echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi
        basedOnDependencyAnalysis: false
    dependencies:
      - sdk: MusicKit.framework
      - package: SpotifyiOS

  SiftTests:
    type: bundle.unit-test
    platform: iOS
    bundleId: com.jessicahirsh.sift.tests
    sources:
      - SiftTests
    dependencies:
      - target: Sift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jessicahirsh.sift.tests
        PRODUCT_MODULE_NAME: SiftTests
        GENERATE_INFOPLIST_FILE: YES

  SiftUITests:
    type: bundle.ui-testing
    platform: iOS
    bundleId: com.jessicahirsh.sift.uitests
    sources:
      - SiftUITests
    dependencies:
      - target: Sift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jessicahirsh.sift.uitests
        PRODUCT_MODULE_NAME: SiftUITests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: ""
        TEST_HOST: ""

schemes:
  Sift:
    build:
      targets:
        Sift: [run, archive, profile, analyze]
        SiftTests: [test]
        SiftUITests: [test]
    test:
      targets:
        - SiftTests
        - SiftUITests

  SiftUnitTests:
    build:
      targets:
        Sift: [test]
        SiftTests: [test]
    test:
      targets:
        - SiftTests
      coverage:
        enabled: true
        targets:
          - Sift

  SiftScreenshots:
    build:
      targets:
        Sift: [run, test]
        SiftUITests: [test]
    test:
      targets:
        - name: SiftUITests
          skipped: false
          selectedTests:
            - SiftScreenshots
